<!-- Backdrop -->
<div class="modal-backdrop" (click)="cancel.emit()"></div>

<!-- Modal Panel -->
<div class="modal-panel" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="modal-header">
        <div class="icon-warning">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                </path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        </div>
        <button class="close-btn" type="button" (click)="cancel.emit()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <!-- Content -->
    <div class="modal-content">
        <h2 class="modal-title">Delete Bookmark</h2>
        <p class="modal-desc">
            Are you sure you want to delete <strong>"{{ title }}"</strong>? This action cannot be undone.
        </p>
    </div>

    <!-- Actions -->
    <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cancel.emit()">Cancel</button>
        <button type="button" class="btn-delete" (click)="confirm.emit()">Delete</button>
    </div>
</div>
