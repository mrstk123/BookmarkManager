<div class="page-layout">
  <app-bookmarks-view
    [bookmarks]="(filteredBookmarks$ | async) || []"
    [showNewButton]="true"
    [pageTitle]="'Favorites'"
    [defaultFavorite]="true"
    (delete)="onDelete($event)"
    (unfavorited)="onUnfavorited($event)"
    (created)="onCreated()">
  </app-bookmarks-view>
</div>
