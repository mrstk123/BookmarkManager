<div class="page-layout">
  <app-bookmarks-view
    [bookmarks]="(filteredBookmarks$ | async) || []"
    [showNewButton]="true"
    [pageTitle]="'All Bookmarks'"
    (delete)="onDelete($event)"
    (toggledFavorite)="onToggledFavorite($event)"
    (created)="onCreated()">
  </app-bookmarks-view>
</div>
