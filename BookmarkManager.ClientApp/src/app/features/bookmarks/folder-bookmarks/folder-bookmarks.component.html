<div class="page-layout">
    <app-bookmarks-view [bookmarks]="(filteredBookmarks$ | async) || []" [showNewButton]="true"
        [pageTitle]="(route.paramMap | async)?.get('name') || 'Folder'"
        [defaultFolder]="(route.paramMap | async)?.get('name') || ''"
        (delete)="onDelete($event)"
        (toggledFavorite)="onToggledFavorite($event)" (created)="onCreated()">
    </app-bookmarks-view>
</div>
