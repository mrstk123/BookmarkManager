<div class="forgot-page">
  <!-- Branded Left Panel -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="brand-icon-group">
        <svg class="brand-logo" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/>
        </svg>
      </div>
      <h1 class="brand-title">Bookmarks</h1>
      <p class="brand-tagline">We'll get you back in, no worries.</p>
    </div>
    <div class="floating-icon fi-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
    <div class="floating-icon fi-2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
    <div class="floating-icon fi-3"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg></div>
  </div>

  <!-- Form Panel -->
  <div class="form-panel">
    <div class="forgot-card">
      <div class="header">
        <div class="icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 class="title1">Forgot Password</h2>
        <p class="sub1">Enter your email to reset your password</p>
      </div>

      <form class="form" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
        <div class="email-field">
          <label class="e-lbl" for="email">Email Address</label>
          <div class="e-input">
            <input type="email" id="email" formControlName="email" placeholder="Enter your email">
          </div>
        </div>

        <div class="forgot-error" *ngIf="forgotError">{{ forgotError }}</div>

        <button type="submit" class="login-btn" [disabled]="!forgotForm.valid">
          <span class="lb-txt">Reset Password</span>
          <svg class="btn-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <div class="footer">
        <span class="f-txt1">Remembered?</span>
        <a class="f-txt2" routerLink="/login">Log in</a>
      </div>
    </div>
  </div>
</div>
